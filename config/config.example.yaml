# Copy to config/config.yaml and edit. config.yaml is gitignored (may hold secrets).

paths:
  zeek_log_dir: /opt/zeek/logs/current      # dns.log, ssl.log, http.log, conn.log
  suricata_eve: /var/log/suricata/eve.json  # Suricata JSON events
  ja3_baseline: null                         # optional: file of benign JA3 hashes (one per line) to freeze rarity

window:
  size_seconds: 300         # analysis window per entity
  baseline_days: 7          # benign period used to freeze the UEBA baseline

# Which UEBA producer implements the contract (see RESEARCH_AND_PLAN.md §6)
ueba:
  source: baseline          # "baseline" (IsolationForest fallback) or "openuba"
  openuba:
    es_index: openuba-anomalies
  baseline:
    model_path: models/isoforest.joblib
    contamination: 0.05

# Normalized indicator weights used by the correlation engine (must be documented in the report)
weights:
  dns_entropy: 0.15
  dga: 0.10
  nxdomain_rate: 0.15
  beacon_cv: 0.25
  ja3_rarity: 0.10
  doh_endpoint: 0.10
  session_shape: 0.10
  query_len: 0.05
ueba_weight: 0.40          # weight given to the UEBA anomaly score vs the indicator bundle

thresholds:
  entropy_high: 3.5        # Shannon entropy above this looks DGA/tunnel-like
  nxdomain_ratio_high: 0.2
  beacon_cv_low: 0.10      # coefficient of variation below this = very regular = beacon
  alert_confidence_min: 0.6

elasticsearch:
  hosts: ["https://localhost:9200"]   # TLS; use http://... only if security is disabled
  alert_index: c2-alerts
  user: elastic
  # password: set via ELASTIC_PASSWORD env or config/secrets.env (never commit real creds)
  verify_certs: false                 # self-signed lab CA; point to a ca file to verify


mitre_map:
  dns_entropy: ["T1568.002", "T1071.004"]
  dga: ["T1568.002"]
  query_len: ["T1071.004", "T1048.003"]
  nxdomain_rate: ["T1568.002"]
  beacon_cv: ["T1071.001", "T1571"]
  ja3_rarity: ["T1573", "T1071.001"]
  doh_endpoint: ["T1071.004", "T1572"]
  session_shape: ["T1071.001", "T1573"]
